# Eclipse Mosquitto configuration for Computer
# ADR-009: No anonymous connections; per-device credentials

listener 1883
allow_anonymous false

# Password file (generated by bootstrap.sh)
password_file /mosquitto/config/passwd

# ACL file
acl_file /mosquitto/config/acl.conf

# Logging
log_dest stdout
log_type error
log_type warning
log_type information

# Persistence
persistence true
persistence_location /mosquitto/data/

# TLS listener (for production; cert files generated separately)
# listener 8883
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false
