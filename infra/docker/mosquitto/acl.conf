# MQTT ACL configuration for Computer
# ADR-009: Per-device topic ACLs; no wildcard publish on command_request topics

# Orchestrator: can publish to all command_request; subscribe to ack and health
user computer-orchestrator
topic write computer/+/+/+/command_request
topic read computer/+/+/+/command_ack
topic read computer/+/+/+/health
topic read computer/+/+/+/telemetry
topic read computer/+/+/+/event
topic write computer/+/+/+/health

# Event ingest: read-only from hardware perspective; subscribes to everything except commands
user computer-event-ingest
topic read computer/+/+/+/telemetry
topic read computer/+/+/+/event
topic read computer/+/+/+/health

# Greenhouse control: only its domain
user computer-greenhouse-control
topic read computer/spokane/greenhouse/+/command_request
topic write computer/spokane/greenhouse/+/command_ack
topic write computer/spokane/greenhouse/+/telemetry
topic write computer/spokane/greenhouse/+/event
topic write computer/spokane/greenhouse/+/health

# Hydro control: only its domain
user computer-hydro-control
topic read computer/spokane/greenhouse/hydro-+/command_request
topic write computer/spokane/greenhouse/hydro-+/command_ack
topic write computer/spokane/greenhouse/hydro-+/telemetry

# Rover control
user computer-rover-control
topic read computer/spokane/rover/+/command_request
topic write computer/spokane/rover/+/command_ack
topic write computer/spokane/rover/+/telemetry
topic write computer/spokane/rover/+/health

# Drone control
user computer-drone-control
topic read computer/spokane/drone/+/command_request
topic write computer/spokane/drone/+/command_ack
topic write computer/spokane/drone/+/telemetry
topic write computer/spokane/drone/+/health

# HA adapter: publishes translated events only; reads nothing sensitive
user computer-ha-adapter
topic write computer/spokane/+/+/event
topic write computer/spokane/+/+/telemetry
topic read computer/spokane/+/+/health

# Frigate adapter: publishes security events only
user computer-frigate-adapter
topic write computer/spokane/security/+/event
topic write computer/spokane/security/+/health

# Energy engine
user computer-energy-engine
topic read computer/spokane/energy/+/command_request
topic write computer/spokane/energy/+/command_ack
topic write computer/spokane/energy/+/telemetry
topic write computer/spokane/energy/+/health

# Healthcheck (for Docker healthcheck probe)
user healthcheck
topic write healthcheck
