name: Robotics CI

on:
  pull_request:
    paths:
      - 'robotics/**'
      - 'services/rover-control/**'
      - 'services/drone-control/**'

jobs:
  robotics-gate:
    name: Robotics Gate (F07)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check robotics gate requirement
        run: |
          echo "Robotics gate: PRs touching robotics/ or rover-control/ or drone-control/"
          echo "Require SITL pass before merge."
          echo ""
          echo "SITL tests require a self-hosted runner with ROS 2 Kilted + Gazebo."
          echo "Label this PR with 'needs-sitl' to trigger the simulation workflow."
          echo ""
          echo "This check will fail until SITL gate is configured."
          echo "See docs/delivery/hil-gate-plan.md for setup instructions."

          # Check if simulation workflow results are available
          # In production, this checks for a required status from the sim workflow
          echo "Robotics gate: PENDING (SITL runner not yet configured)"
          # exit 0 for now; will exit 1 once SITL runner is set up

  rover-unit-tests:
    name: Rover State Machine Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install rover-control deps
        run: uv sync --project services/rover-control

      - name: Run rover state machine tests
        run: |
          uv run --project services/rover-control pytest services/rover-control/tests/ -v \
            --tb=short

  sitl-rover:
    name: Rover SITL
    runs-on: self-hosted
    if: contains(github.event.pull_request.labels.*.name, 'needs-sitl')
    steps:
      - uses: actions/checkout@v4

      - name: ROS2 build
        run: |
          source /opt/ros/kilted/setup.bash
          cd robotics/ros2_ws
          colcon build --packages-select rover_control

      - name: Run SITL scenarios
        run: |
          source /opt/ros/kilted/setup.bash
          echo "Starting Gazebo SITL world..."
          gz sim robotics/simulation/gazebo_world.sdf --headless-rendering &
          sleep 10
          echo "Running SITL scenarios..."
          python3 robotics/simulation/rover_sitl.py --scenario waypoint_mission
          python3 robotics/simulation/rover_sitl.py --scenario safe_stop
          python3 robotics/simulation/rover_sitl.py --scenario battery_low_rth
          echo "SITL: All scenarios passed"

  sitl-drone:
    name: Drone SITL
    runs-on: self-hosted
    if: contains(github.event.pull_request.labels.*.name, 'needs-sitl')
    steps:
      - uses: actions/checkout@v4

      - name: PX4 SITL build
        run: |
          cd robotics/px4
          echo "PX4 SITL build: Phase G"

      - name: Drone arm guard test (F01)
        run: |
          echo "Verifying drone arming cannot be triggered from model-router..."
          python scripts/ci/safety_gate.py
